<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Text to Speech</h1>
        <p>Type or paste text, or upload a plain <code>.txt</code> file, then convert it to audio.</p>

        <!-- Input method selector -->
        <div class="tabs" role="tablist">
            <button class="tab-btn active" data-target="textPanel" role="tab" aria-selected="true">
                Type / Paste
            </button>
            <button class="tab-btn" data-target="filePanel" role="tab" aria-selected="false">
                Upload File
            </button>
        </div>

        <!-- Direct text input -->
        <div class="tab-panel active" id="textPanel" role="tabpanel">
            <textarea
                id="textInput"
                placeholder="Enter your text here…"
                maxlength="5000"
                aria-label="Text to convert"
            ></textarea>
            <div class="char-count"><span id="charCount">0</span> / 5000</div>
        </div>

        <!-- File upload -->
        <div class="tab-panel" id="filePanel" role="tabpanel">
            <label class="file-label" for="fileInput">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span id="fileName">Choose a .txt file</span>
                <input type="file" id="fileInput" accept=".txt" aria-label="Upload text file">
            </label>
        </div>

        <button class="btn" id="convertBtn">Convert to Speech</button>

        <!-- Status / error feedback -->
        <div id="statusMsg" class="status" role="status" aria-live="polite"></div>

        <!-- Audio player — hidden until a conversion succeeds -->
        <div id="audioSection" class="audio-section" hidden>
            <audio id="audioPlayer" controls aria-label="Generated speech audio"></audio>
            <a id="downloadLink" class="btn btn-outline" download="speech.mp3">
                Download MP3
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
